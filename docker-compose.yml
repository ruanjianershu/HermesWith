version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hermeswith-postgres
    environment:
      POSTGRES_USER: hermeswith
      POSTGRES_PASSWORD: hermeswith
      POSTGRES_DB: hermeswith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hermeswith-redis
    ports:
      - "6379:6379"

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    container_name: hermeswith-control-plane
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hermeswith:***@postgres:5432/hermeswith
      - REDIS_URL=redis://redis:6379/0
      - CONTROL_PLANE_WS=ws://control-plane:8000/ws
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    command: uvicorn hermeswith.control_plane.api:create_app --host 0.0.0.0 --port 8000 --reload

  researcher:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    container_name: hermeswith-researcher
    environment:
      - AGENT_ID=researcher
      - COMPANY_ID=default
      - AGENT_ROLE=researcher
      - AGENT_MODEL=k2p5
      - AGENT_BASE_URL=https://api.kimi.com/coding/v1
      - AGENT_API_KEY=${KIMI_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - CONTROL_PLANE_WS=ws://control-plane:8000/ws
    volumes:
      - .:/app
      - ~/.hermes/hermes-agent:/app/vendor/hermes-agent
    depends_on:
      - control-plane
      - redis
    command: python -m hermeswith.runtime.main

volumes:
  pgdata:
